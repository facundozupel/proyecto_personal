<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Cream background -->
  <rect width="128" height="128" fill="#FCFAF2"/>
  <!-- Black border -->
  <rect x="2" y="2" width="124" height="124" fill="none" stroke="#1a1a1a" stroke-width="4"/>
  <!-- Terracota circle — top-right Bauhaus accent -->
  <circle cx="100" cy="28" r="18" fill="#BF551A"/>
  <!-- Black horizontal bar — Bauhaus divider -->
  <rect x="12" y="58" width="104" height="4" fill="#1a1a1a"/>
  <!-- F letter — black, geometric -->
  <rect x="18" y="72" width="6" height="42" fill="#1a1a1a"/>
  <rect x="18" y="72" width="36" height="6" fill="#1a1a1a"/>
  <rect x="18" y="88" width="26" height="5" fill="#1a1a1a"/>
  <!-- Z letter — terracota, geometric -->
  <rect x="66" y="72" width="36" height="6" fill="#BF551A"/>
  <polygon points="66,108 96,78 102,78 72,108" fill="#BF551A"/>
  <rect x="66" y="108" width="36" height="6" fill="#BF551A"/>
  <!-- Small black square — Bauhaus accent bottom-left -->
  <rect x="12" y="12" width="12" height="12" fill="#1a1a1a"/>
</svg>
